version: v1alpha1
agents:
  - name: sonnet
    model: claude-sonnet-4-6
    effort: high
  - name: opus-xhigh
    model: claude-opus-4-8
    effort: xhigh
  - name: codex-xhigh
    model: gpt-5.5
    effort: xhigh
map:
  max_file_bytes: 500000
  code_index: auto
out_of_scope: block
pipeline:
  clarify:
    loop:
      max: 3
      patience: 0
      settle: 0
  execute:
    by: sonnet
  contract_review:
    by: codex-xhigh
    loop:
      max: 4
      patience: 2
      settle: 1
  code_review:
    by: opus-xhigh
    loop:
      max: 10
      patience: 2
      settle: 1
